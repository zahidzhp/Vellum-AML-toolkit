mode: BALANCED
seed: 42

dataset:
  path: ""
  modality_override: null
  target_column: label
  group_column: null
  time_column: null
  metadata_columns: []

splitting:
  strategy: STRATIFIED
  test_ratio: 0.2
  val_ratio: 0.1
  random_seed: 42

profiling:
  imbalance_ratio_warning: 5.0
  imbalance_ratio_severe: 20.0
  duplicate_check_enabled: true
  ood_shift_enabled: true

probes:
  enabled_probes:
    - majority
    - stratified
    - logistic
    - rf
    - xgb
  intervention_branches:
    - none
    - class_weighting
    - oversampling
    - undersampling
  metric: macro_f1

interventions:
  allowed_types:
    - CLASS_WEIGHTING
    - OVERSAMPLING
    - UNDERSAMPLING
    - AUGMENTATION
    - FOCAL_LOSS
    - THRESHOLDING
    - CALIBRATION
  oversampling_noise_risk_threshold: 0.15
  require_calibration_when_imbalanced: true

candidates:
  allowed_families:
    - logistic
    - rf
    - xgb
    - mlp
    - embedding_head
  max_candidates: 5
  budget_strategy: equal
  cnn_backbone: resnet18
  vit_backbone: vit_small_patch16_224
  feature_extractor_backbone: resnet18

runtime_decision:
  min_warmup_epochs_default: 5
  min_warmup_epochs_neural: 10
  improvement_slope_threshold: 0.001
  overfit_gap_limit: 0.15
  patience: 3

calibration:
  enabled_methods:
    - temperature_scaling
    - isotonic
  primary_objective: ece

ensemble:
  enabled_strategies:
    - soft_voting
    - weighted_averaging
  marginal_gain_threshold: 0.01
  max_ensemble_size: 3

explainability:
  tabular_methods:
    - feature_importance
    - shap
  image_methods:
    - gradcam
  faithfulness_enabled: true

reporting:
  output_dir: outputs
  formats:
    - json
    - markdown
  verbosity: normal

compute:
  max_training_time_seconds: 3600
  memory_limit_gb: null
  gpu_enabled: true
  resource_abstention_on_oom: true

advanced:
  run_history:
    enabled: false
    store_path: "~/.aml_toolkit/run_history.jsonl"
    max_records: 1000
  uncertainty:
    enabled: false
    methods: [entropy, margin]
    aggregation: mean
    abstain_if_above: 0.8
    affects_ranking: false
    use_calibrated_proba: true
    conformal_enabled: false
    conformal_coverage: 0.9
    use_cross_val: false
    cross_val_folds: 5
  dynamic_ensemble:
    enabled: false
    allowed_modes: [greedy_diverse]
    max_members: 4
    allow_per_sample: false
    min_evidence_models: 3
    diversity_threshold: 0.05
    use_uncertainty_weights: false
  meta_policy:
    enabled: false
    exploration_weight: 0.3
    allow_skip_low_value: true
    allow_reorder_only: true
    never_override_user_constraints: true
    compute_budget_aware: true
    similarity_method: cosine
    recency_decay: 0.9
  agentic_planner:
    enabled: false
    mode: propose_only
    max_suggestions: 3
    allow_data_review_requests: false
    allow_abstention_recommendation: true
    llm_enhanced: false
    track_proposal_outcomes: true
  version_features:
    uncertainty: false
    dynamic_ensemble: false
    meta_policy: false
    agentic_planner: false
    run_history: false
